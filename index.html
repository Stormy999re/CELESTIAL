<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلستيال المتألق | Celestial SA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --main-color: #0084ff; 
            --bg-dark: #0a0a0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: white;

            /* --- السطر الذي ستقوم بتعديله دائماً --- */
            background-image: url('https://media.discordapp.net/attachments/1482050860379799582/1494839874681966693/Picsart_25-10-29_12-19-03-936.jpg?ex=69e4119e&is=69e2c01e&hm=33e751b3397ae827c3cdf01b8cbf9cc2463bfefea88bb34cc5428ccee2a9ee6c&=&format=webp&width=1522&height=856'); 
            /* -------------------------------------- */

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: var(--bg-dark); /* يظهر إذا فشلت الصورة */
        }

        .profile-card {
            background-color: rgba(22, 22, 26, 0.9); 
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .avatar-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--main-color);
            box-shadow: 0 0 20px rgba(0, 132, 255, 0.4);
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .social-icons a {
            text-decoration: none;
            color: white;
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            transition: 0.3s;
        }

        .social-icons a:hover { background: var(--main-color); transform: translateY(-5px); }

        .links-container { display: flex; flex-direction: column; gap: 12px; }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.08);
            padding: 16px 20px;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: 0.2s;
        }

        .link-item:hover { background: rgba(255,255,255,0.15); border-color: var(--main-color); transform: scale(1.02); }

        .disabled { opacity: 0.6; cursor: not-allowed !important; pointer-events: none; }

        .store-btn { background: linear-gradient(45deg, var(--main-color), #00d2ff); margin-top: 10px; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-container">
            <img src="https://yt3.googleusercontent.com/TxMIVDCP05snsdxY4iA2IugdyxecpcemqP4BLooOR_95uNAeabMu19a5qJb4WiJmEpbHkyIAT4M=s160-c-k-c0x00ffffff-no-rj" alt="Celestial SA" class="avatar-img">
        </div>

        <h1>سلستيال المتألق</h1>
        <p style="color:var(--main-color); margin-bottom: 25px;">صانع محتوى بـ روبلوكس</p>

        <div class="social-icons">
            <a href="https://www.tiktok.com/@celestial_sa" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.instagram.com/celestial._.sa" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://web.facebook.com/people/سلستيال-المتألق/61586469446493/" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.youtube.com/@Celestia_SA" target="_blank"><i class="fab fa-youtube"></i></a>
        </div>

        <div class="links-container">
            <a href="https://www.roblox.com/games/139807050239531/Drink-or-Die" target="_blank" class="link-item">
                <span><i class="fas fa-play-circle"></i> جرب لعبتي: Drink or Die</span>
                <i class="fas fa-chevron-left"></i>
            </a>

            <a href="https://discord.gg/5Pg34aaRdg" target="_blank" class="link-item">
                 <span><i class="fab fa-discord"></i> انضم لـسيرفري بالدسكورد</span>
                  <i class="fas fa-chevron-left"></i>
            </a>

            <a href="https://www.roblox.com/users/7856484770/profile" target="_blank" class="link-item">
                <span><i class="fas fa-user-circle"></i> ملفي الشخصي في روبلوكس</span>
                <i class="fas fa-chevron-left"></i>
            </a>

            <div class="link-item store-btn disabled">
                <span><i class="fas fa-shopping-bag"></i> متجر سلستيال (قريباً)</span>
                <i class="fas fa-lock"></i>
            </div>
        </div>
    </div>

</body>
</html>
